<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kırmızı Buton</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: black;
            color: lime;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        #canvas {
            display: block;
            margin: auto;
        }
        .glitch {
            position: absolute;
            color: white;
            text-shadow: 2px 0 red, -2px 0 blue;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { clip-path: inset(0); }
            33% { clip-path: inset(10%); }
            66% { clip-path: inset(0); }
            100% { clip-path: inset(15%); }
        }
        .crt {
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.7),
                rgba(0, 0, 0, 0.7) 9%,
                rgba(255, 255, 255, 0.1) 9%,
                rgba(255, 255, 255, 0.1) 10%
            );
            display: block;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="message" class="glitch">Basılacak Kırmızı Buton!</div>
    <div class="crt"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let plane; // Image of the plane

        // Load the sound effects
        const beep = new Audio('beep.mp3');
        const explosion = new Audio('explosion.mp3');
        const happyBirthday = new Audio('happy_birthday.mp3');

        function loadImages() {
            plane = new Image();
            plane.src = 'plane.png';
            plane.onload = function() {
                draw();
            };
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Add code to draw the plane and animate flying into towers
            ctx.drawImage(plane, 50, canvas.height / 2);
            // Add explosion and sound effect when plane hits tower
            setTimeout(() => {
                explosion.play();
                ctx.fillStyle = 'red';
                ctx.fillRect(50, canvas.height / 2, 50, 50);
            }, 3000); // Simulate hit after 3 seconds
        }

        window.onload = () => {
            loadImages();
            setTimeout(() => { beep.play(); }, 500);
            setTimeout(() => { happyBirthday.play(); }, 2000);
        };
    </script>
</body>
</html>
